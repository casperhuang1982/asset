<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資產配置與再平衡監控系統</title>
    <style>
        /* 整體網頁樣式設定 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 30px;
            line-height: 1.6;
        }
        
        /* 主容器樣式 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2em;
        }

        /* 狀態提示文字 */
        #loadingStatus {
            color: #e67e22;
            font-weight: bold;
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 15px;
            height: 24px;
            transition: opacity 0.5s;
        }

        /* 總結區塊樣式 */
        .summary-box {
            margin-top: 10px;
            margin-bottom: 25px;
            padding: 25px;
            background-color: #f8f9fa;
            border-left: 6px solid #2980b9;
            border-radius: 6px;
            font-size: 1.3em;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .summary-item span {
            font-size: 0.8em;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .summary-item strong {
            color: #2c3e50;
            font-size: 1.4em;
        }

        /* 按鈕樣式 */
        button {
            display: block;
            width: 280px;
            margin: 0 auto 35px auto;
            padding: 15px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(41, 128, 185, 0.3);
        }

        button:hover {
            background-color: #3498db;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(41, 128, 185, 0.3);
        }

        /* 設定面板區域 */
        .settings-panel {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
        }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #fff;
        }

        th, td {
            padding: 15px 12px;
            text-align: right;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background-color: #34495e;
            color: #ffffff;
            text-align: center;
            font-weight: 500;
            font-size: 1.05em;
        }

        td:first-child {
            text-align: left;
            font-weight: bold;
            color: #2980b9;
            font-size: 1.1em;
        }

        /* 買賣建議的文字顏色 */
        .action-buy {
            color: #27ae60;
            font-weight: bold;
            background-color: #eafaf1;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .action-sell {
            color: #e74c3c;
            font-weight: bold;
            background-color: #fdedec;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .action-none {
            color: #95a5a6;
        }

        /* 輸入框樣式 */
        input[type="number"] {
            width: 100px;
            padding: 8px 10px;
            text-align: right;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #3498db;
            outline: none;
        }
        
        /* Radio 按鈕樣式微調 */
        input[type="radio"] {
            transform: scale(1.2);
            margin-right: 5px;
            cursor: pointer;
        }
        
        label {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>資產配置與再平衡監控</h1>
        
        <div id="loadingStatus">準備載入資料...</div>

        <!-- 總資產顯示區塊 -->
        <div class="summary-box">
            <div class="summary-item">
                <span>總資產市值 (美金)</span>
                <strong id="totalValueUSD">$0.00</strong>
            </div>
            <div class="summary-item">
                <span>總資產市值 (台幣)</span>
                <strong id="totalValueTWD">NT$ 0</strong>
            </div>
        </div>
        
        <!-- 手動觸發計算按鈕 -->
        <button onclick="calculateRebalance()">執行再平衡計算</button>

        <!-- 設定面板：匯率與基礎幣別切換 -->
        <div class="settings-panel">
            <div class="setting-group">
                <label for="exchangeRate">USD/TWD 匯率：</label>
                <!-- 當匯率改變時，自動重新計算 -->
                <input type="number" id="exchangeRate" value="31.74" step="0.0001" onchange="calculateRebalance()">
                <small style="color: #27ae60; font-size: 0.85em; margin-left: 5px;">(已同步 Google Sheet 匯率)</small>
            </div>
            <div class="setting-group">
                <label>計算基礎幣別：</label>
                <!-- 當切換幣別時，自動重新計算 -->
                <label>
                    <input type="radio" name="baseCurrency" value="USD" checked onchange="calculateRebalance()"> 
                    美金 (USD)
                </label>
                <label style="margin-left: 15px;">
                    <input type="radio" name="baseCurrency" value="TWD" onchange="calculateRebalance()"> 
                    台幣 (TWD)
                </label>
            </div>
        </div>

        <!-- 資產配置表格 -->
        <table id="portfolioTable">
            <thead>
                <tr>
                    <th>標的 (Ticker)</th>
                    <th>計價幣別</th>
                    <th>目標權重 (%)</th>
                    <th>目前股數</th>
                    <th>目前股價</th>
                    <th id="marketValueHeader">目前市值 (USD)</th>
                    <th>目前權重 (%)</th>
                    <th>建議動作 (股數)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- JavaScript 會在這裡動態產生資料列 -->
            </tbody>
        </table>
        
    </div>

    <script>
        // 1. 預設投資組合資料 (已對齊您的 CSV 代碼格式，例如 TPE:0050)
        let initialPortfolio = [
            { ticker: 'VT', currency: 'USD', targetWeight: 57, shares: 4700, price: 140.40 },
            { ticker: 'VGIT', currency: 'USD', targetWeight: 23.5, shares: 4300, price: 59.98 },
            { ticker: 'TPE:006208', currency: 'TWD', targetWeight: 18, shares: 45000, price: 170.00 },
            { ticker: 'BNDX', currency: 'USD', targetWeight: 1.5, shares: 350, price: 49.00 },
            { ticker: 'TPE:0050', currency: 'TWD', targetWeight: 0, shares: 0, price: 200.00 },
            { ticker: 'TPE:0056', currency: 'TWD', targetWeight: 0, shares: 0, price: 40.00 },
            { ticker: 'TPE:00757', currency: 'TWD', targetWeight: 0, shares: 0, price: 90.00 },
            { ticker: 'TPE:00646', currency: 'TWD', targetWeight: 0, shares: 0, price: 50.00 },
            { ticker: 'VOO', currency: 'USD', targetWeight: 0, shares: 0, price: 550.00 },
            { ticker: 'GLD', currency: 'USD', targetWeight: 0, shares: 0, price: 260.00 },
            { ticker: 'IBIT', currency: 'USD', targetWeight: 0, shares: 0, price: 45.00 }
        ];

        // ================= LocalStorage 資料存取功能 =================
        // 讀取本地儲存的設定與資料
        function loadFromLocalStorage() {
            try {
                // 讀取基礎幣別設定
                const savedCurrency = localStorage.getItem('baseCurrency');
                if (savedCurrency) {
                    const radioBtn = document.querySelector(`input[name="baseCurrency"][value="${savedCurrency}"]`);
                    if (radioBtn) radioBtn.checked = true;
                }

                // 讀取上次紀錄的匯率
                const savedExchangeRate = localStorage.getItem('exchangeRate');
                if (savedExchangeRate) {
                    document.getElementById('exchangeRate').value = savedExchangeRate;
                }

                // 讀取各標的的股數、目標權重與「上次的股價」
                const savedPortfolio = localStorage.getItem('portfolioData');
                if (savedPortfolio) {
                    const parsedData = JSON.parse(savedPortfolio);
                    
                    // 利用儲存的資料覆蓋 initialPortfolio 的預設值
                    initialPortfolio.forEach(item => {
                        const savedItem = parsedData.find(p => p.ticker === item.ticker);
                        if (savedItem) {
                            if (!isNaN(savedItem.targetWeight)) item.targetWeight = savedItem.targetWeight;
                            if (!isNaN(savedItem.shares)) item.shares = savedItem.shares;
                            if (!isNaN(savedItem.price)) item.price = savedItem.price; // 讀取並覆蓋為上次的股價
                        }
                    });
                }
            } catch (error) {
                console.error("讀取本地儲存失敗:", error);
            }
        }

        // 將當前的設定與資料存入本地儲存
        function saveToLocalStorage() {
            try {
                // 儲存基礎幣別設定
                const baseCurrency = document.querySelector('input[name="baseCurrency"]:checked').value;
                localStorage.setItem('baseCurrency', baseCurrency);

                // 儲存當前的匯率
                const exchangeRate = document.getElementById('exchangeRate').value;
                localStorage.setItem('exchangeRate', exchangeRate);

                // 提取最新的股數、權重與「最新股價」資料，準備存檔
                const dataToSave = initialPortfolio.map(item => {
                    return {
                        ticker: item.ticker,
                        targetWeight: item.targetWeight,
                        shares: item.shares,
                        price: item.price // 儲存當前的股價
                    };
                });
                
                localStorage.setItem('portfolioData', JSON.stringify(dataToSave));
            } catch (error) {
                console.error("寫入本地儲存失敗:", error);
            }
        }
        // ==========================================================

        // 2. 格式化數字為貨幣字串的工具函式
        function formatCurrency(num, currencySymbol = '') {
            return currencySymbol + new Intl.NumberFormat('en-US', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            }).format(num);
        }

        // 3. 解析 CSV 格式的進階函式
        function parseCSVToArray(strData) {
            const objPattern = new RegExp((
                "(\\,|\\r?\\n|\\r|^)" +
                "(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|" +
                "([^\"\\,\\r\\n]*))"
            ), "gi");
            let arrData = [[]];
            let arrMatches = null;
            while (arrMatches = objPattern.exec(strData)) {
                const strMatchedDelimiter = arrMatches[1];
                if (strMatchedDelimiter.length && strMatchedDelimiter !== ",") {
                    arrData.push([]);
                }
                let strMatchedValue;
                if (arrMatches[2]) {
                    strMatchedValue = arrMatches[2].replace(new RegExp("\"\"", "g"), "\"");
                } else {
                    strMatchedValue = arrMatches[3];
                }
                arrData[arrData.length - 1].push(strMatchedValue);
            }
            return arrData;
        }

        // 4. 從 Google Sheets (CSV) 抓取報價與匯率資料
        async function fetchPricesFromSheet() {
            const statusEl = document.getElementById('loadingStatus');
            statusEl.style.opacity = '1';
            statusEl.innerText = '正在從 Google Sheets 抓取最新報價與匯率...';
            statusEl.style.color = '#2980b9';

            // 將 /pubhtml 自動替換為 /pub?output=csv 以便讀取原始資料
            const originalUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSJZCi_7qDOKVxzzZ2GsglxSChQH-fRlii2tQoRb3a-v_GxSfGims6tfm9q1fyoWOZxjiHN72Qofakr/pub?output=csv';
            
            // 使用 allorigins 代理伺服器繞過本地端瀏覽器的 CORS 阻擋
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(originalUrl)}`;

            try {
                // 加入時間戳記避免讀取到舊快取
                const timestamp = new Date().getTime();
                const response = await fetch(`${proxyUrl}&t=${timestamp}`);
                if (!response.ok) throw new Error('無法取得 Google Sheets 資料');
                
                const csvText = await response.text();
                const csvData = parseCSVToArray(csvText);

                let tickerIdx = -1;
                let priceIdx = -1;
                let headerRowIdx = -1;
                let updateCount = 0;
                let isExchangeRateUpdated = false;

                // 第一階段：嚴謹地掃描尋找真正的表頭列 (鎖定 "代碼" 與 "PRICE")
                for (let i = 0; i < csvData.length; i++) {
                    const row = csvData[i];
                    let tempTickerIdx = -1;
                    let tempPriceIdx = -1;

                    for (let j = 0; j < row.length; j++) {
                        if (row[j] && row[j].trim() === '代碼') tempTickerIdx = j;
                        if (row[j] && row[j].trim() === 'PRICE') tempPriceIdx = j;
                    }

                    // 必須在「同一列」同時找到這兩個欄位，才認定為正確的表頭
                    if (tempTickerIdx !== -1 && tempPriceIdx !== -1) {
                        tickerIdx = tempTickerIdx;
                        priceIdx = tempPriceIdx;
                        headerRowIdx = i;
                        break;
                    }
                }

                // 第二階段：從表頭的下一列開始讀取正確的資料
                if (tickerIdx !== -1 && priceIdx !== -1) {
                    for (let i = headerRowIdx + 1; i < csvData.length; i++) {
                        const row = csvData[i];
                        if (row[tickerIdx] && row[priceIdx]) {
                            const ticker = row[tickerIdx].trim();
                            // 移除數字中的千分位逗號與貨幣符號
                            const priceStr = row[priceIdx].replace(/[",$\s]/g, '').trim();
                            const price = parseFloat(priceStr);

                            if (!isNaN(price) && ticker) {
                                
                                // 特殊判斷：如果是匯率資料 (代碼為 TWD)
                                if (ticker === 'TWD') {
                                    document.getElementById('exchangeRate').value = price.toFixed(4); // 顯示到小數第四位
                                    isExchangeRateUpdated = true;
                                    continue; // 更新完匯率直接換下一列
                                }

                                // 尋找對應的投資組合標的 (支援直接比對，例如 TPE:0050)
                                const portfolioItem = initialPortfolio.find(p => p.ticker === ticker);
                                
                                if (portfolioItem) {
                                    portfolioItem.price = price;
                                    
                                    // 同步更新網頁上的輸入框
                                    const itemIndex = initialPortfolio.indexOf(portfolioItem);
                                    const priceInput = document.getElementById(`price_${itemIndex}`);
                                    if (priceInput) priceInput.value = price;
                                    updateCount++;
                                }
                            }
                        }
                    }
                }

                // 顯示結果
                if (updateCount > 0) {
                    let msg = `✅ 成功更新 ${updateCount} 筆報價`;
                    if (isExchangeRateUpdated) msg += ` 及最新匯率`;
                    msg += `！`;
                    statusEl.innerText = msg;
                    statusEl.style.color = '#27ae60';
                } else {
                    statusEl.innerText = `⚠️ 載入成功，但在「代碼」與「PRICE」欄位中未找到對應標的。`;
                    statusEl.style.color = '#e67e22';
                }

            } catch (error) {
                console.error('抓取 CSV 失敗:', error);
                statusEl.innerText = `⚠️ 無法載入 Google Sheets 資料，請手動確認股價。`;
                statusEl.style.color = '#e74c3c';
            }
            
            // 4秒後漸隱提示文字
            setTimeout(() => { statusEl.style.opacity = '0'; }, 10000);

            // 資料抓取並填入後，自動執行一次再平衡計算
            calculateRebalance();
        }

        // 5. 初始化並產生表格內容
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            initialPortfolio.forEach((item, index) => {
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td>${item.ticker}</td>
                    <td style="text-align: center;">${item.currency}</td>
                    <td><input type="number" id="target_${index}" value="${item.targetWeight}" step="0.1" onchange="calculateRebalance()"></td>
                    <td><input type="number" id="shares_${index}" value="${item.shares}" onchange="calculateRebalance()"></td>
                    <td><input type="number" id="price_${index}" value="${item.price}" step="0.01" onchange="calculateRebalance()"></td>
                    <td id="marketValue_${index}">-</td>
                    <td id="currentWeight_${index}">-</td>
                    <td id="action_${index}">-</td>
                `;
                tableBody.appendChild(tr);
            });
            
            // 初始宣染後先算一次預設值
            calculateRebalance();
        }

        // 6. 核心計算邏輯
        function calculateRebalance() {
            const exchangeRate = parseFloat(document.getElementById('exchangeRate').value);
            const baseCurrency = document.querySelector('input[name="baseCurrency"]:checked').value;
            
            document.getElementById('marketValueHeader').innerText = `目前市值 (${baseCurrency})`;

            let totalMarketValueUSD = 0;
            let totalMarketValueTWD = 0;
            const updatedPortfolio = [];

            // 第一階段：將網頁上的最新輸入值更新回陣列，並計算雙幣別市值
            initialPortfolio.forEach((item, index) => {
                const targetWeight = parseFloat(document.getElementById(`target_${index}`).value);
                const shares = parseFloat(document.getElementById(`shares_${index}`).value);
                const price = parseFloat(document.getElementById(`price_${index}`).value);
                
                // 同步將畫面上的最新值寫回記憶體
                item.targetWeight = targetWeight;
                item.shares = shares;
                
                let valueUSD = 0;
                let valueTWD = 0;

                if (item.currency === 'USD') {
                    valueUSD = shares * price;
                    valueTWD = valueUSD * exchangeRate;
                } else if (item.currency === 'TWD') {
                    valueTWD = shares * price;
                    valueUSD = valueTWD / exchangeRate;
                }

                totalMarketValueUSD += valueUSD;
                totalMarketValueTWD += valueTWD;

                updatedPortfolio.push({
                    index: index,
                    ticker: item.ticker,
                    currency: item.currency,
                    targetWeight: targetWeight,
                    shares: shares,
                    price: price,
                    valueUSD: valueUSD,
                    valueTWD: valueTWD
                });
            });

            // 觸發本地儲存：只要有重新計算，就自動把最新的狀態存進瀏覽器
            saveToLocalStorage();

            // 更新總資產顯示
            document.getElementById('totalValueUSD').innerText = formatCurrency(totalMarketValueUSD, '$');
            document.getElementById('totalValueTWD').innerText = formatCurrency(totalMarketValueTWD, 'NT$ ');

            const totalBaseValue = (baseCurrency === 'USD') ? totalMarketValueUSD : totalMarketValueTWD;

            // 第二階段：計算權重落差並給出買賣建議
            updatedPortfolio.forEach(item => {
                const itemBaseValue = (baseCurrency === 'USD') ? item.valueUSD : item.valueTWD;
                // 預防除以零的狀況
                const currentWeight = totalBaseValue > 0 ? (itemBaseValue / totalBaseValue) * 100 : 0;
                
                const currencySymbol = baseCurrency === 'USD' ? '$' : '';
                document.getElementById(`marketValue_${item.index}`).innerText = formatCurrency(itemBaseValue, currencySymbol);
                document.getElementById(`currentWeight_${item.index}`).innerText = currentWeight.toFixed(2) + '%';

                const targetBaseValue = totalBaseValue * (item.targetWeight / 100);
                const differenceBaseValue = targetBaseValue - itemBaseValue;

                let differenceShares = 0;

                if (item.currency === 'USD') {
                    const diffUSD = (baseCurrency === 'USD') ? differenceBaseValue : (differenceBaseValue / exchangeRate);
                    differenceShares = diffUSD / item.price;
                } else if (item.currency === 'TWD') {
                    const diffTWD = (baseCurrency === 'TWD') ? differenceBaseValue : (differenceBaseValue * exchangeRate);
                    differenceShares = diffTWD / item.price;
                }

                let actionText = '';
                // 誤差大於 0.5 股才顯示買賣建議，避免微小碎股的頻繁交易
                if (differenceShares > 0.5) {
                    actionText = `<span class="action-buy">買入 ${Math.round(differenceShares).toLocaleString()} 股</span>`;
                } else if (differenceShares < -0.5) {
                    actionText = `<span class="action-sell">賣出 ${Math.abs(Math.round(differenceShares)).toLocaleString()} 股</span>`;
                } else {
                    actionText = '<span class="action-none">無需調整</span>';
                }

                document.getElementById(`action_${item.index}`).innerHTML = actionText;
            });
        }

        // 網頁載入完成後的執行順序
        window.onload = async () => {
            // 1. 先讀取上次存在瀏覽器的資料，覆蓋預設值
            loadFromLocalStorage();
            // 2. 渲染表格
            renderTable();
            // 3. 呼叫 Google Sheets 程式去更新最新的報價與匯率
            await fetchPricesFromSheet();
        };

    </script>
</body>
</html>
